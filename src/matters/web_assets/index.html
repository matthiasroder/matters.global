<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>matters graph</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>matters graph</h1>
          <p id="state-path">Loading state...</p>
        </div>
        <div class="toolbar" aria-label="Graph controls">
          <input id="search" type="search" placeholder="Search matters">
          <select id="status-filter" aria-label="Status filter">
            <option value="all">All</option>
            <option value="actionable">Actionable</option>
            <option value="blocked">Blocked</option>
            <option value="resolved">Resolved</option>
            <option value="unresolved">Unresolved</option>
          </select>
          <button id="show-universe" type="button">Universe</button>
          <button id="show-unlock" type="button">Unlock</button>
          <button id="show-frontier" type="button">Frontier</button>
          <button id="show-horizon" type="button">Horizon</button>
          <button id="reset-view" type="button">Reset</button>
        </div>
      </header>

      <main class="workspace">
        <section class="graph-pane" aria-label="Matters dependency graph">
          <svg id="graph" role="img" aria-label="Matters dependency graph">
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z"></path>
              </marker>
            </defs>
            <g id="viewport">
              <g id="edges"></g>
              <g id="nodes"></g>
            </g>
          </svg>
          <div id="empty-state" class="empty-state" hidden>
            <h2>No matters yet</h2>
            <p>Create the first matter to start building the graph.</p>
          </div>
        </section>

        <aside class="side-panel" aria-label="Graph tools and inspector">
          <section class="panel-section">
            <h2>Inspector</h2>
            <div id="inspector" class="inspector muted">Select a node to inspect it.</div>
          </section>

          <section class="panel-section">
            <h2>Create Matter</h2>
            <form id="create-matter-form" class="stack">
              <input name="title" required placeholder="Matter title">
              <input name="id" placeholder="Optional id">
              <textarea name="conditions" rows="4" placeholder="One condition per line"></textarea>
              <button type="submit">Create matter</button>
            </form>
          </section>

          <section class="panel-section">
            <h2>Dependencies</h2>
            <form id="dependency-form" class="stack">
              <select name="source" required aria-label="Prerequisite matter"></select>
              <select name="target" required aria-label="Dependent matter"></select>
              <div class="button-row">
                <button type="submit">Add edge</button>
                <button id="remove-dependency" type="button">Remove edge</button>
              </div>
            </form>
          </section>

          <section class="panel-section chat-panel">
            <h2>Chat / Commands</h2>
            <div id="messages" class="messages" aria-live="polite"></div>
            <form id="command-form" class="command-form">
              <input name="command" autocomplete="off" placeholder="unlock, universe, frontier <id>">
              <button type="submit">Run</button>
            </form>
          </section>
        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
